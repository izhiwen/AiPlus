name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets
        # Warnings allowed in v0.1.x; will tighten in v0.2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo test --workspace --no-fail-fast --locked -- \
            --skip self_update_falls_back_to_sha256_when_checksums_txt_missing \
            --skip self_update_and_update_all_are_safe_in_fake_home \
            --skip setup_gpg_end_to_end_with_fake_gpg
          # ^^^ three tests require Linux release binaries or Mac-specific GPG; skipped until release assets exist
