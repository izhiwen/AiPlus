# Cross.toml — configuration for the `cross` cross-compilation tool.
#
# Used by .github/workflows/release.yml for Linux ARM64 builds. `cross`
# runs Rust cross-compilation inside an official cross-rs Docker image,
# which removes the need to manually fight Ubuntu apt sources, multi-arch
# dpkg, and pkg-config sysroot setup on the runner host.
#
# Why this file exists at all:
#   The `keyring` crate (Phase 2 of multi-platform rollout) uses
#   `linux-native-sync-persistent` which links against libdbus-1.so for
#   Secret Service. The default cross-rs image for
#   aarch64-unknown-linux-gnu does NOT include the libdbus dev package,
#   so we use the `pre-build` hook to install it inside the image
#   before `cargo build` runs.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install --assume-yes libdbus-1-dev:$CROSS_DEB_ARCH pkg-config"
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = [
    # Tell pkg-config inside the cross image that cross-arch .pc files
    # are valid to consume when resolving libdbus-1.
    "PKG_CONFIG_ALLOW_CROSS=1"
]
