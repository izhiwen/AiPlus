---
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Owner-supported pre-built platforms (per README): Apple Silicon
        # Mac + Intel Windows. Intel Mac, Linux x86_64/aarch64, and
        # Windows ARM are not supported — users on those platforms must
        # build from source via `cargo build --release -p aiplus-cli`.
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # macos-14-arm64 runners ship Homebrew rustup, whose `cargo` symlink
      # trampolines to rustup-init and errors with "unexpected argument
      # 'build' found / Usage: rustup-init[EXE] [OPTIONS]" instead of
      # delegating to the rustup proxy. Force the dtolnay-installed
      # ~/.cargo/bin proxies to the front of PATH so `cargo build` resolves
      # to the real rustup proxy. (Linux + Windows runners don't have this
      # collision.)
      - name: Pin cargo to dtolnay rust-toolchain (macOS)
        if: runner.os == 'macOS'
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # Cache key gets a `native`/`cross` segment because cross-rs builds
      # run inside an older Ubuntu 20.04 container (glibc 2.31) while the
      # host runner is Ubuntu 24.04 (glibc 2.39). Sharing target/ between
      # them lets host-glibc-2.39-linked build script binaries from a
      # prior native run get executed inside the cross container, which
      # fails with `GLIBC_2.32 not found`. The `-v2` salt lets us bump it
      # if we ever need a clean wipe.
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.cross && 'cross' || 'native' }}-v2

      # `cross` (https://github.com/cross-rs/cross) is the Rust-community-
      # standard cross-compile tool. It builds inside an official Docker
      # image with the correct toolchain + sysroot pre-installed, which
      # avoids fighting Ubuntu multi-arch apt sources, dpkg architecture
      # registration, and pkg-config sysroot config on the runner host.
      # System dependencies like libdbus-1-dev for the target arch are
      # configured via the workspace-root `Cross.toml` `pre-build` hook.
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build release binary (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }} -p aiplus-cli --locked

      - name: Build release binary (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p aiplus-cli --locked

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN_NAME="aiplus"
          ASSET="aiplus-${{ matrix.target }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar -czf "${GITHUB_WORKSPACE}/${ASSET}" "${BIN_NAME}"
          cd "${GITHUB_WORKSPACE}"
          ls -la "${ASSET}"

      - name: Compute checksum (Unix)
        if: runner.os != 'Windows'
        run: |
          ASSET="aiplus-${{ matrix.target }}.tar.gz"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${ASSET}" > "${ASSET}.sha256"
          else
            sha256sum "${ASSET}" > "${ASSET}.sha256"
          fi
          cat "${ASSET}.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\aiplus.exe"
          $asset = "aiplus-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $asset -Force
          Get-Item $asset
          $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLower()
          "$hash  $asset" | Out-File -Encoding ASCII -NoNewline "$asset.sha256"
          Get-Content "$asset.sha256"

      - uses: actions/upload-artifact@v4
        if: runner.os != 'Windows'
        with:
          name: aiplus-${{ matrix.target }}
          path: |
            aiplus-${{ matrix.target }}.tar.gz
            aiplus-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: aiplus-${{ matrix.target }}
          path: |
            aiplus-${{ matrix.target }}.zip
            aiplus-${{ matrix.target }}.zip.sha256
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: publish release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Assemble single checksums.txt
        run: |
          cd dist
          ls -la
          {
            for f in aiplus-*.tar.gz aiplus-*.zip; do
              [ -f "$f" ] || continue
              if command -v shasum >/dev/null 2>&1; then
                shasum -a 256 "$f"
              else
                sha256sum "$f"
              fi
            done
          } > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt
          # Remove per-asset .sha256 files (consolidated into checksums.txt)
          rm -f aiplus-*.tar.gz.sha256 aiplus-*.zip.sha256

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Publishing release for tag: ${TAG}"
          # Create a draft release so the Owner can review notes/assets before
          # making it visible to consumers. Owner promotes from draft via
          # GitHub UI or `gh release edit "${TAG}" --draft=false`.
          #
          # P2.1: use --notes-from-tag instead of --generate-notes. The
          # auto-generated notes from `--generate-notes` produced a
          # reverse-reference ("Full Changelog: compare/v0.5.10...v0.5.9"
          # when v0.5.10 was the NEW tag and v0.5.9 the previous), which
          # reads backwards. The tag annotation (set via `git tag -a vX -m
          # "..."`) is authoritative — release maintainer already writes
          # a multi-line summary there for every release, and `--notes-
          # from-tag` uses that verbatim. If the tag has no annotation
          # this falls back to an empty body and the owner can edit it
          # before promoting the draft.
          ASSETS=$(ls dist/aiplus-*.tar.gz dist/aiplus-*.zip 2>/dev/null || true)
          gh release create "${TAG}" \
            --title "AiPlus ${TAG}" \
            --draft \
            --notes-from-tag \
            ${ASSETS} \
            dist/checksums.txt

  # Mirror of AEL's `notify-aiplus-on-release.yml`: fire a
  # `repository_dispatch` to izhiwen/AiEconLab so its
  # `aiplus-drift-check.yml` runs immediately on release rather than
  # waiting for the weekly cron. The matching listener was added in
  # AEL PR #71.
  #
  # Requires repo secret AEL_DISPATCH_TOKEN — a fine-grained PAT scoped
  # to izhiwen/AiEconLab with Actions: write + Metadata: read. Missing
  # token is a non-fatal warning (release itself still publishes).
  notify-ael:
    name: notify ael on release
    runs-on: ubuntu-latest
    needs: build-release
    if: success()
    steps:
      - name: Dispatch to AiEconLab
        env:
          DISPATCH_TOKEN: ${{ secrets.AEL_DISPATCH_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "::warning::AEL_DISPATCH_TOKEN is not set; cross-repo dispatch skipped."
            echo "Add a PAT scoped to izhiwen/AiEconLab (Actions: write) as repo secret AEL_DISPATCH_TOKEN to enable auto-notification."
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/izhiwen/AiEconLab/dispatches \
            -d "{\"event_type\":\"aiplus-released\",\"client_payload\":{\"tag\":\"${TAG}\"}}"
          echo "Dispatched aiplus-released to izhiwen/AiEconLab with tag=${TAG}"
