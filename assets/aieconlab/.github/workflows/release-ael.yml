name: Release AEL

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload assets to, for example v0.1.0"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest]

    steps:
      - name: Checkout AEL
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vendor/aiplus/target
          key: ${{ runner.os }}-cargo-ael-${{ hashFiles('vendor/aiplus/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ael-

      - name: Package AEL
        env:
          # Strip leading 'v' from tag (v0.1.3 -> 0.1.3) so asset filenames
          # match the release tag. Falls through to scripts/build-ael.sh default
          # when run outside a tag push.
          AEL_VERSION: ${{ inputs.release_tag != '' && (startsWith(inputs.release_tag, 'v') && format('{0}', inputs.release_tag) || inputs.release_tag) || (startsWith(github.ref_name, 'v') && github.ref_name || '') }}
        run: |
          set -euo pipefail
          # Normalize: strip leading 'v' if present.
          if [ -n "${AEL_VERSION}" ]; then
            AEL_VERSION="${AEL_VERSION#v}"
            export AEL_VERSION
          fi
          scripts/build-ael.sh --package
          for asset in dist/*.tar.gz; do
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$asset" > "$asset.sha256"
            else
              sha256sum "$asset" > "$asset.sha256"
            fi
          done
          ls -l dist/*.tar.gz
          ls -l dist/*.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ael-${{ runner.os }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || \
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes "AEL ${RELEASE_TAG}"
          gh release upload "${RELEASE_TAG}" dist/*.tar.gz dist/*.sha256 --clobber
