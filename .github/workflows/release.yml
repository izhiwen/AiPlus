---
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-14         # Apple Silicon runner cross-compiles to x86_64
            ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # libdbus-1-dev is required by `keyring` crate's `linux-native-sync-persistent`
      # feature (Phase 2 of multi-platform rollout). Native Linux builds need
      # the host package; aarch64 cross-build needs the arm64-flavor.
      - name: Install Linux native build deps
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Linux aarch64 cross-compile toolchain
        if: matrix.cross
        run: |
          sudo dpkg --add-architecture arm64
          # Restrict the default Ubuntu mirror to amd64/i386 so the arm64
          # repositories can be added separately pointing at ports.ubuntu.com
          # (the amd64 mirror does not carry arm64 packages and causes 404s).
          sudo sed -i 's|^deb http|deb [arch=amd64,i386] http|g' /etc/apt/sources.list || true
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's|^Architectures: .*|Architectures: amd64 i386|' /etc/apt/sources.list.d/ubuntu.sources || true
          fi
          # Add arm64 ports.
          codename=$(lsb_release -cs)
          sudo tee /etc/apt/sources.list.d/arm64.list >/dev/null <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename} main universe
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename}-updates main universe
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename}-security main universe
          EOF
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libdbus-1-dev:arm64 pkg-config
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
          # Tell pkg-config to look for the arm64 .pc files when cross-building.
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p aiplus-cli --locked

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN_NAME="aiplus"
          ASSET="aiplus-${{ matrix.target }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar -czf "${GITHUB_WORKSPACE}/${ASSET}" "${BIN_NAME}"
          cd "${GITHUB_WORKSPACE}"
          ls -la "${ASSET}"

      - name: Compute checksum (Unix)
        if: runner.os != 'Windows'
        run: |
          ASSET="aiplus-${{ matrix.target }}.tar.gz"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${ASSET}" > "${ASSET}.sha256"
          else
            sha256sum "${ASSET}" > "${ASSET}.sha256"
          fi
          cat "${ASSET}.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\aiplus.exe"
          $asset = "aiplus-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $asset -Force
          Get-Item $asset
          $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLower()
          "$hash  $asset" | Out-File -Encoding ASCII -NoNewline "$asset.sha256"
          Get-Content "$asset.sha256"

      - uses: actions/upload-artifact@v4
        if: runner.os != 'Windows'
        with:
          name: aiplus-${{ matrix.target }}
          path: |
            aiplus-${{ matrix.target }}.tar.gz
            aiplus-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: aiplus-${{ matrix.target }}
          path: |
            aiplus-${{ matrix.target }}.zip
            aiplus-${{ matrix.target }}.zip.sha256
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: publish release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Assemble single checksums.txt
        run: |
          cd dist
          ls -la
          {
            for f in aiplus-*.tar.gz aiplus-*.zip; do
              [ -f "$f" ] || continue
              if command -v shasum >/dev/null 2>&1; then
                shasum -a 256 "$f"
              else
                sha256sum "$f"
              fi
            done
          } > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt
          # Remove per-asset .sha256 files (consolidated into checksums.txt)
          rm -f aiplus-*.tar.gz.sha256 aiplus-*.zip.sha256

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Publishing release for tag: ${TAG}"
          # Create a draft release so the Owner can review notes/assets before
          # making it visible to consumers. Owner promotes from draft via
          # GitHub UI or `gh release edit "${TAG}" --draft=false`.
          ASSETS=$(ls dist/aiplus-*.tar.gz dist/aiplus-*.zip 2>/dev/null || true)
          gh release create "${TAG}" \
            --title "AiPlus ${TAG}" \
            --draft \
            --generate-notes \
            ${ASSETS} \
            dist/checksums.txt
