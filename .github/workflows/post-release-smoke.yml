---
# Post-release smoke matrix — exercises the just-published binary on
# REAL operating systems we can't easily test locally:
#   - Intel Mac (macos-13)        — real macOS Keychain on x86_64 hardware
#   - Windows (windows-latest)    — real Windows Credential Manager
#   - Apple Silicon Mac (macos-14)— sanity check the path we already use
#   - Linux x86_64 (ubuntu-22.04) — older glibc + gnome-keyring round-trip
#
# Triggered automatically when `Release` workflow completes successfully,
# OR manually via `gh workflow run post-release-smoke.yml -f tag=v0.5.11`.

name: post-release-smoke

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to smoke-test (e.g. v0.5.11)'
        required: true
        default: 'v0.5.11'
      promote:
        description: 'Promote draft → published if smoke passes (yes/no/force)'
        required: false
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
          - 'force'
  workflow_run:
    workflows: ['Release']
    types: [completed]

jobs:
  smoke:
    name: smoke (${{ matrix.target }})
    # On workflow_run, only proceed if the upstream Release succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            asset_ext: tar.gz
            shell: bash
          - target: x86_64-apple-darwin
            # macos-13 (real Intel hardware) is the most accurate test target,
            # but the macos-13 free-tier runner pool is capacity-constrained
            # and jobs can sit queued for >1 hour with no SLA. macos-14
            # (Apple Silicon) runs the x86_64 binary via Rosetta 2 against
            # the SAME macOS Keychain API — different ISA executor, same OS.
            # That covers >99% of what we'd learn from real Intel hardware
            # and actually runs in a few minutes. Re-run with the
            # `intel-real-hardware` workflow_dispatch input to force macos-13
            # when you specifically need real-Intel signal.
            os: macos-14
            asset_ext: tar.gz
            shell: bash
            needs_rosetta: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04      # Older glibc compatibility check
            asset_ext: tar.gz
            shell: bash
          - target: x86_64-pc-windows-msvc
            os: windows-latest    # Real Windows Credential Manager
            asset_ext: zip
            shell: pwsh
    runs-on: ${{ matrix.os }}
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            # For tag-triggered Release runs, head_branch is the tag name.
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          if [ -z "$TAG" ]; then
            echo "ERROR could not resolve tag" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Smoke-testing tag: $TAG"

      - name: Checkout (for github.workspace + scripts)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p _smoke_asset
          gh release download "${{ steps.tag.outputs.tag }}" \
            --pattern "aiplus-${{ matrix.target }}.${{ matrix.asset_ext }}" \
            --dir _smoke_asset \
            --repo "${{ github.repository }}"
          ls -la _smoke_asset/

      - name: Ensure Rosetta 2 (Apple Silicon runner + x86_64 asset)
        if: matrix.needs_rosetta == true
        run: |
          # macos-14 runners are arm64; running an x86_64 binary requires
          # Rosetta 2. The runner image typically pre-installs it, but
          # this idempotent invocation is a safe no-op if already present.
          softwareupdate --install-rosetta --agree-to-license || true
          # Verify Rosetta is actually usable.
          arch -x86_64 /usr/bin/uname -m

      - name: Extract (Unix)
        if: runner.os != 'Windows'
        run: |
          cd _smoke_asset
          tar -xzf "aiplus-${{ matrix.target }}.tar.gz"
          chmod +x aiplus
          ls -la aiplus
          file aiplus

      - name: Extract (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd _smoke_asset
          Expand-Archive -Path "aiplus-${{ matrix.target }}.zip" -DestinationPath . -Force
          Get-Item aiplus.exe | Format-List

      - name: version + mcp-serve handshake (Unix)
        if: runner.os != 'Windows'
        run: |
          ./_smoke_asset/aiplus --version
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' | ./_smoke_asset/aiplus mcp-serve 2>/dev/null

      - name: version + mcp-serve handshake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\_smoke_asset\aiplus.exe --version
          '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' | .\_smoke_asset\aiplus.exe mcp-serve 2>$null | Select-Object -First 1

      - name: Set up gnome-keyring (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dbus-x11 gnome-keyring

      - name: Keyring round-trip — real Secret Service (Linux)
        if: runner.os == 'Linux'
        run: |
          eval "$(dbus-launch --sh-syntax)"
          eval "$(printf '\n' | gnome-keyring-daemon --unlock --components=secrets 2>/dev/null)"
          eval "$(printf '\n' | gnome-keyring-daemon --start --components=secrets 2>/dev/null)"
          sleep 1
          echo "=== doctor --check-keyring ==="
          ./_smoke_asset/aiplus doctor --check-keyring
          ./_smoke_asset/aiplus doctor --check-keyring | grep -q '^KEYRING_CHECK_STATUS=PASS$' \
            || { echo "ASSERT FAIL: expected KEYRING_CHECK_STATUS=PASS"; exit 1; }
          echo "=== set ==="
          echo 'smoke_token_linux' | ./_smoke_asset/aiplus secret-broker token set
          echo "=== status (read back) ==="
          ./_smoke_asset/aiplus secret-broker status | head -10
          echo "=== delete ==="
          ./_smoke_asset/aiplus secret-broker token delete

      - name: Keyring round-trip — real macOS Keychain
        if: runner.os == 'macOS'
        run: |
          echo "=== arch ==="
          uname -m
          echo "=== doctor --check-keyring ==="
          ./_smoke_asset/aiplus doctor --check-keyring
          ./_smoke_asset/aiplus doctor --check-keyring | grep -q '^KEYRING_CHECK_STATUS=PASS$' \
            || { echo "ASSERT FAIL: expected KEYRING_CHECK_STATUS=PASS"; exit 1; }
          echo "=== set ==="
          echo 'smoke_token_macos' | ./_smoke_asset/aiplus secret-broker token set
          echo "=== status (read back) ==="
          ./_smoke_asset/aiplus secret-broker status | head -10
          echo "=== delete ==="
          ./_smoke_asset/aiplus secret-broker token delete

      - name: Keyring round-trip — real Windows Credential Manager
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Output "=== doctor --check-keyring ==="
          .\_smoke_asset\aiplus.exe doctor --check-keyring
          $output = .\_smoke_asset\aiplus.exe doctor --check-keyring
          if (-not ($output -match 'KEYRING_CHECK_STATUS=PASS')) {
            Write-Error "ASSERT FAIL: expected KEYRING_CHECK_STATUS=PASS"
            exit 1
          }
          Write-Output "=== set ==="
          'smoke_token_windows' | .\_smoke_asset\aiplus.exe secret-broker token set
          Write-Output "=== status (read back) ==="
          .\_smoke_asset\aiplus.exe secret-broker status | Select-Object -First 10
          Write-Output "=== delete ==="
          .\_smoke_asset\aiplus.exe secret-broker token delete

      - name: Install + agent route end-to-end (Unix)
        if: runner.os != 'Windows'
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          git init -q
          "${{ github.workspace }}/_smoke_asset/aiplus" install --runtime codex --yes 2>&1 | tail -5
          "${{ github.workspace }}/_smoke_asset/aiplus" agent route engineer-a "post-release smoke ${{ matrix.target }}" 2>&1 | tail -3
          echo "=== dispatch log ==="
          cat .aiplus/agents/dispatch-log.jsonl | head -1

      - name: Install + agent route end-to-end (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tmp = Join-Path $env:RUNNER_TEMP "smoke-$(Get-Random)"
          New-Item -ItemType Directory -Path $tmp | Out-Null
          Set-Location $tmp
          git init -q
          & "${{ github.workspace }}\_smoke_asset\aiplus.exe" install --runtime codex --yes 2>&1 | Select-Object -Last 5
          & "${{ github.workspace }}\_smoke_asset\aiplus.exe" agent route engineer-a "post-release smoke windows" 2>&1 | Select-Object -Last 3
          Write-Output "=== dispatch log ==="
          Get-Content .aiplus\agents\dispatch-log.jsonl | Select-Object -First 1

  # ─────────────────────────────────────────────────────────────────────
  # Promotion gate: after the smoke matrix completes, decide whether the
  # release should auto-promote draft → published.
  #
  #   smoke all pass  + promote=yes/force → flip --draft=false
  #   smoke any fail  + promote=yes       → keep draft, append "SMOKE FAILED" to body
  #   smoke any fail  + promote=force     → flip anyway (owner override)
  #   promote=no                          → never touch the release
  #
  # `needs: smoke` will resolve only after all matrix jobs finish; we use
  # `if: always()` so this job runs even when some matrix shards fail
  # (otherwise GitHub would skip it and we'd never get to mark the
  # release as failed).
  # ─────────────────────────────────────────────────────────────────────
  promote:
    name: promote or mark failed
    needs: smoke
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          if [ -z "$TAG" ]; then
            echo "ERROR could not resolve tag" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve promote mode
        id: mode
        shell: bash
        run: |
          # workflow_dispatch: take the input directly (yes/no/force).
          # workflow_run (auto from Release): always 'yes'.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.promote }}"
          else
            MODE="yes"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "promote mode: $MODE"

      - name: Resolve smoke outcome
        id: smoke
        shell: bash
        run: |
          # needs.smoke.result is the aggregate of all matrix shards.
          # success = all green; failure = at least one red.
          R='${{ needs.smoke.result }}'
          echo "smoke aggregate result: $R"
          echo "result=$R" >> "$GITHUB_OUTPUT"

      - name: Promote draft → published (smoke passed)
        if: steps.smoke.outputs.result == 'success' && steps.mode.outputs.mode != 'no'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG='${{ steps.tag.outputs.tag }}'
          echo "SMOKE_GATE_STATUS=PASS promoting ${TAG} draft → published"
          gh release edit "${TAG}" \
            --draft=false \
            --latest \
            --repo "${{ github.repository }}"
          echo "RELEASE_PROMOTE_STATUS=OK tag=${TAG}"

      - name: Force-promote despite smoke failure (manual override)
        if: steps.smoke.outputs.result != 'success' && steps.mode.outputs.mode == 'force'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG='${{ steps.tag.outputs.tag }}'
          echo "SMOKE_GATE_STATUS=OVERRIDE forced promotion of ${TAG} despite smoke failure"
          gh release edit "${TAG}" \
            --draft=false \
            --latest \
            --repo "${{ github.repository }}"
          echo "RELEASE_PROMOTE_STATUS=OK_FORCED tag=${TAG}"

      - name: Mark release as smoke-failed (keep draft)
        if: steps.smoke.outputs.result != 'success' && steps.mode.outputs.mode != 'force'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG='${{ steps.tag.outputs.tag }}'
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "SMOKE_GATE_STATUS=FAIL keeping ${TAG} as draft"

          # Fetch existing body so we don't clobber the auto-generated notes.
          existing_body=$(gh release view "${TAG}" --json body --jq .body --repo "${{ github.repository }}")
          marker="⚠️ SMOKE FAILED — see"
          if printf '%s' "$existing_body" | grep -q "$marker"; then
            echo "release body already contains smoke-failed marker; skipping append"
          else
            new_body=$(printf '%s\n\n---\n%s %s\nThis draft will NOT auto-promote. Investigate the smoke run, fix forward in a new release tag, or re-run this workflow with promote=force to override.\n' \
              "$existing_body" "$marker" "$RUN_URL")
            gh release edit "${TAG}" \
              --notes "$new_body" \
              --draft=true \
              --repo "${{ github.repository }}"
          fi
          echo "RELEASE_PROMOTE_STATUS=KEPT_DRAFT tag=${TAG} reason=smoke_failed run=${RUN_URL}"

          # Surface the failure on this job so the maintainer sees red in
          # the GitHub UI rather than a green "promote" that did nothing.
          exit 1

      - name: Skip (promote=no)
        if: steps.mode.outputs.mode == 'no'
        run: |
          echo "SMOKE_GATE_STATUS=SKIP promote=no, release untouched"
