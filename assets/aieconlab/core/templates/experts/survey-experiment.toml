schema_version = "1.0"

[agent]
role = "survey-experiment"
display_name = "Survey / Experiment Specialist"
tier = "expert"
default_specialty = ""
warm_bench_ttl_seconds = 300

[persona]
system_prompt_file = "personas/survey-experiment.md"
voice = "specialist"
escalation_target = "pi"

[workspace]
needs_worktree = true
worktree_branch = "agent/survey-experiment"
worktree_path = "../{project_name}.survey-experiment"

[memory]
personal_dir = ".aiplus/agent-memory/survey-experiment"
read_team_memory = true
read_project_memory = true
write_team_memory = false

[invocation]
chinese_aliases = ["实验", "RCT", "survey", "field experiment", "power analysis", "pre-registration"]
english_aliases = ["survey-experiment", "rct", "field-experiment", "survey", "power", "pre-registration"]
