[workspace]
members = ["crates/aiplus-cli", "crates/aiplus-core"]
resolver = "2"

[workspace.package]
edition = "2021"
license = "Apache-2.0"
publish = false

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
ctrlc = "3"
rpassword = "7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml_ng = "0.10"
signal-hook = "0.3"
tempfile = "3"
toml = "0.8"
fs2 = "0.4"
sha2 = "0.10"
hex = "0.4"
shell-words = "1.1"
